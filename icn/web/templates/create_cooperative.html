{% extends "base.html" %}

{% block content %}
<h1>Create Cooperative</h1>
<form method="POST">
    <div class="mb-3">
        <label for="name" class="form-label">Cooperative Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <button type="submit" class="btn btn-primary">Create Cooperative</button>
</form>
{% endblock %}
